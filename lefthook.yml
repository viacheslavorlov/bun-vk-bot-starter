pre-commit:
  parallel: true
  commands:
    format:
      run: bun run oxfmt --write {staged_files} && git add {staged_files}
      stage_fixed: true
    typecheck:
      run: bun run tsc --noEmit
      glob: '*.ts'
pre-push:
  commands:
    check-version:
      run: |
        if ! git diff origin/main --name-only | grep -q package.json; then
          echo "Warning: package.json version not changed. Consider running 'bun release'"
        fi
      skip: true # не блокирует пуш
